<div id="viewServer">
    <h1><span id="roomId">0000</span> - <span id="roomName">Room name</span></h1>
    <div class="content">
        <div class="content-col themed">
            <div class="issueInput">
                <div class="inputBox">
                    <span>Issue: <span id="issueText"></span></span>
                    <input class="themed" type="text" name="issue" placeholder="Issue..."/>
                    <div class="resizer" for="issue"></div>
                    <div class="invalidHint">
                        <p>Issue cannot be empty.</p>
                    </div>
                </div>
                <div class="inputBox">
                    <button class="themed"><span class="material-symbols-outlined">send</span></button>
                </div>
            </div>
        </div>
    </div>
</div>
